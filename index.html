    <style>

</head>
<body class="font-sans antialiased select-none">
    <div class="max-w-md mx-auto p-6 space-y-8 pb-20">
        
        <!-- Cabecera con Botón de Seguridad -->
        <header class="pt-4 flex items-center justify-between border-b border-white/5 pb-4">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-900/40">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
                </div>
                <div>
                    <h1 class="text-xl font-black tracking-tight uppercase italic text-white">Vox Ultra</h1>
                    <p class="text-[9px] text-zinc-500 font-mono tracking-widest uppercase">Seguridad Local Activa</p>
                </div>
            </div>
            
            <!-- Candado de Seguridad -->
            <button id="keyBtn" class="p-3 bg-zinc-900 border border-white/5 rounded-2xl active:scale-95 transition-transform relative">
                <svg id="lockIcon" class="text-red-500" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </button>
        </header>

        <!-- Cuadro de Diálogo Emergente para Configurar Clave (Modal Seguro) -->
        <div id="keyModal" class="hidden fixed inset-0 bg-black/80 backdrop-filter backdrop-blur-sm flex items-center justify-center p-6 z-50">
            <div class="glass p-6 w-full max-w-sm space-y-4 animate-in zoom-in-95 duration-200">
                <h2 class="text-sm font-bold uppercase tracking-wider text-blue-400">Clave API de Google</h2>
                <p class="text-[11px] text-zinc-400 leading-relaxed">Tu clave no se subirá a GitHub ni a internet. Se quedará guardada de forma privada solo en la memoria de tu propio teléfono.</p>
                <input type="password" id="keyInput" placeholder="Pega tu clave aquí (AIzaSy...)" 
                    class="w-full p-3 bg-black/60 border border-white/10 rounded-xl text-xs text-white focus:outline-none focus:border-blue-500 font-mono">
                <div class="grid grid-cols-2 gap-3">
                    <button id="cancelKeyBtn" class="py-3 bg-zinc-900 border border-white/5 rounded-xl text-xs font-bold text-zinc-400 active:scale-95 transition-transform">CANCELAR</button>
                    <button id="saveKeyBtn" class="py-3 bg-blue-600 text-white rounded-xl text-xs font-bold active:scale-95 transition-transform">GUARDAR</button>
                </div>
            </div>
        </div>

        <!-- Formulario Principal -->
        <div class="glass p-6 space-y-6">
            <textarea id="textInput" placeholder="Escribe el texto que la IA va a leer..." 
                class="w-full h-40 bg-black/40 border border-white/5 rounded-xl p-4 text-sm focus:border-blue-500 outline-none transition-all resize-none text-white"></textarea>

            <div class="space-y-3">

                <select id="voiceSelect" class="w-full bg-zinc-900 border border-white/10 p-4 rounded-xl text-sm outline-none focus:border-blue-500 appearance-none text-zinc-300">
                    <option value="Charon">Locutor Profesional (30 años exp)</option>
                    <option value="Kore">Voz Narrativa Clara</option>
                    <option value="Zephyr">Voz Juvenil Energética</option>

            <button id="generateBtn" class="w-full py-5 rounded-2xl bg-blue-600 text-white font-black text-sm flex items-center justify-center gap-3 active:scale-95 transition-all shadow-xl shadow-blue-900/20">
                <span id="btnText">GENERAR LOCUCIÓN</span>
                <div id="btnLoader" class="spinner hidden"></div>
            </button>
        </div>

        <!-- Resultado Final -->
        <div id="resultPanel" class="glass p-6 space-y-6 hidden animate-in fade-in slide-in-from-bottom-4">
            <div class="flex items-center justify-between px-1">
                <span class="text-[10px] font-bold text-blue-400 uppercase tracking-widest">Master Finalizado</span>
            </div>

            <audio id="mainAudio" controls class="w-full h-12 opacity-90"></audio>
            
            <div class="flex justify-center pt-2">
                <a id="saveBtn" download="locucion.wav" class="w-full text-center py-4 bg-white text-black rounded-2xl font-black text-sm flex items-center justify-center gap-2 active:scale-95 transition-transform">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                    <span>DESCARGAR AUDIO</span>
                </a>
            </div>
        </div>

        <p id="statusMsg" class="text-center text-[10px] font-mono text-zinc-600 uppercase tracking-tighter"></p>

    </div>

    <script>
        // Recuperar la clave API guardada de forma local y privada
        let apiKey = localStorage.getItem('vox_ultra_private_key') || '';

        const keyBtn = document.getElementById('keyBtn');
        const lockIcon = document.getElementById('lockIcon');
        const keyModal = document.getElementById('keyModal');
        const keyInput = document.getElementById('keyInput');
        const saveKeyBtn = document.getElementById('saveKeyBtn');
        const cancelKeyBtn = document.getElementById('cancelKeyBtn');

        const generateBtn = document.getElementById('generateBtn');
        const textInput = document.getElementById('textInput');
        const voiceSelect = document.getElementById('voiceSelect');
        const statusMsg = document.getElementById('statusMsg');
        const resultPanel = document.getElementById('resultPanel');
        const mainAudio = document.getElementById('mainAudio');
        const saveBtn = document.getElementById('saveBtn');

        const voicePrompts = {
            Charon: "Habla como un locutor profesional con 30 años de experiencia, voz profunda y autoridad: ",
            Kore: "",
            Zephyr: ""
        };

        // Comprobar estado de la clave al iniciar
        updateLockStatus();

        function updateLockStatus() {
            if (apiKey) {
                // Cambiar candado a verde y abierto indicando que está configurado y seguro
                lockIcon.className = "text-green-500";
                lockIcon.innerHTML = `<rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/>`;
                keyInput.value = apiKey;
            } else {
                // Candado rojo y cerrado
                lockIcon.className = "text-red-500";
                lockIcon.innerHTML = `<rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>`;
                keyInput.value = "";
            }
        }

        // Abrir y cerrar ventana de clave
        keyBtn.onclick = () => keyModal.classList.remove('hidden');
        cancelKeyBtn.onclick = () => keyModal.classList.add('hidden');
        
        saveKeyBtn.onclick = () => {
            const val = keyInput.value.trim();
            if (val === "") {
                localStorage.removeItem('vox_ultra_private_key');
                apiKey = "";
            } else {
                localStorage.setItem('vox_ultra_private_key', val);
                apiKey = val;
            }
            updateLockStatus();
            keyModal.classList.add('hidden');
            statusMsg.innerText = "";
        };

        function createWav(pcmData) {
            const buffer = new ArrayBuffer(44 + pcmData.length);
            const view = new DataView(buffer);
            const writeString = (o, s) => { for (let i = 0; i < s.length; i++) view.setUint8(o + i, s.charCodeAt(i)); };
            writeString(0, 'RIFF');
            view.setUint32(4, 36 + pcmData.length, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, 24000, true);
            view.setUint32(28, 48000, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(36, 'data');
            view.setUint32(40, pcmData.length, true);
            new Uint8Array(buffer, 44).set(new Uint8Array(pcmData));
            return new Blob([buffer], { type: 'audio/wav' });
        }

        generateBtn.onclick = async () => {
            if (!apiKey) {
                keyModal.classList.remove('hidden');
                statusMsg.innerText = 'ERROR: POR FAVOR CONFIGURA TU CLAVE DE GOOGLE EN EL CANDADO SUPERIOR';
                return;
            }

            const text = textInput.value.trim();
            if(!text) return;

            generateBtn.disabled = true;
            document.getElementById('btnLoader').classList.remove('hidden');
            document.getElementById('btnText').innerText = 'GENERANDO...';
            statusMsg.innerText = 'PROCESANDO AUDIO EN EL SERVIDOR...';
            resultPanel.classList.add('hidden');

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: voicePrompts[voiceSelect.value] + text }] }],
                        generationConfig: { 
                            responseModalities: ["AUDIO"],
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: voiceSelect.value } } }
                        }
                    })
                });

                if (!response.ok) throw new Error();

                const data = await response.json();
                const b64 = data.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data || data.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
                
                if (!b64) throw new Error();

                const bin = atob(b64);
                const uint = new Uint8Array(bin.length);
                for (let i = 0; i < bin.length; i++) uint[i] = bin.charCodeAt(i);
                
                currentBlob = createWav(uint);
                if(currentUrl) URL.revokeObjectURL(currentUrl);
                currentUrl = URL.createObjectURL(currentBlob);
                
                mainAudio.src = currentUrl;
                saveBtn.href = currentUrl;
                
                resultPanel.classList.remove('hidden');
                statusMsg.innerText = 'LOCUCIÓN LISTA';
                mainAudio.play();
            } catch (e) {
                statusMsg.innerText = 'ERROR EN EL PROCESO (REINTENTA)';
            } finally {
                generateBtn.disabled = false;
                document.getElementById('btnLoader').classList.add('hidden');
                document.getElementById('btnText').innerText = 'GENERAR LOCUCIÓN';
            }
        };
    </script>
</body>
</html>
