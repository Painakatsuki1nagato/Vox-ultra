<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vox Studio Privado</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #121212;
            color: #E0E0E0;
            font-family: system-ui, sans-serif;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 450px;
            background-color: #1A1A1A;
            padding: 25px;
            border-radius: 16px;
            border: 1px solid #2C2C2C;
        }
        h1 { color: #FFFFFF; text-align: center; margin-bottom: 25px; }
        label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: #A0A0A0; text-transform: uppercase; }
        
        /* Estilo para el nuevo cuadro de la contraseña/API */
        .api-input {
            width: 100%;
            padding: 10px;
            background-color: #242424;
            color: #FFF;
            border: 1px solid #3A3A3A;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        textarea {
            width: 100%;
            height: 120px;
            background-color: #242424;
            color: #FFFFFF;
            border: 1px solid #3A3A3A;
            border-radius: 10px;
            padding: 12px;
            font-size: 1rem;
            margin-bottom: 20px;
            resize: none;
        }
        button {
            width: 100%;
            background-color: #00ADB5;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
        }
        .output-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #202020;
            border-radius: 10px;
            border-left: 4px solid #00ADB5;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Vox Studio</h1>
        
        <!-- AQUÍ PEGAS TU CLAVE AL ABRIR LA APP -->
        <label for="apiKeyInput">Clave API (Se borra al cerrar la app):</label>
        <input type="password" id="apiKeyInput" class="api-input" placeholder="Pega tu clave API de OpenAI aquí...">

        <label for="inputText">Texto del Proyecto:</label>
        <textarea id="inputText" placeholder="Escribe tu idea aquí..."></textarea>
        
        <button id="actionBtn" onclick="procesarConAPI()">Generar Magia</button>
        
        <div id="output" class="output-box">Listo para procesar...</div>
    </div>

    <script>
        async function procesarConAPI() {
            // El código lee la clave que tú escribiste en la pantalla, no está guardada en GitHub
            const API_KEY = document.getElementById("apiKeyInput").value.trim();
            const textoUsuario = document.getElementById("inputText").value;
            const outputDiv = document.getElementById("output");
            const boton = document.getElementById("actionBtn");

            if (!API_KEY) {
                alert("Por favor, introduce tu Clave API primero.");
                return;
            }
            if (!textoUsuario.trim()) return;

            boton.innerText = "Procesando...";
            outputDiv.innerText = "Conectando de forma segura...";

            try {
                const respuesta = await fetch("https://api.openai.com/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "gpt-4o-mini",
                        messages: [{ role: "user", content: textoUsuario }]
                    })
                });

                const datos = await respuesta.json();
                outputDiv.innerText = datos.choices?.[0]?.message?.content || "Error en la respuesta.";
            } catch (error) {
                outputDiv.innerText = "Error: " + error.message;
            } finally {
                boton.innerText = "Generar Magia";
            }
        }
    </script>
</body>
          </html>
