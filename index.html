    <script>
        const API_KEY = "AIzaSyAB9VLBtsYjGtIRoz8gRiNEM5KZssjnzow"; 
        let currentBlob = null;
        let currentUrl = null;

        const voicePrompts = {
            Charon: "Habla como un locutor profesional con 30 años de experiencia, voz profunda y autoridad: ",
            Kore: "",
            Zephyr: ""
        };

        const generateBtn = document.getElementById('generateBtn');
        const textInput = document.getElementById('textInput');
        const voiceSelect = document.getElementById('voiceSelect');
        const statusMsg = document.getElementById('statusMsg');
        const resultPanel = document.getElementById('resultPanel');
        const mainAudio = document.getElementById('mainAudio');
        const saveBtn = document.getElementById('saveBtn');

        function createWav(pcmData) {
            const buffer = new ArrayBuffer(44 + pcmData.length);
            const view = new DataView(buffer);
            const writeString = (o, s) => { for (let i = 0; i < s.length; i++) view.setUint8(o + i, s.charCodeAt(i)); };
            writeString(0, 'RIFF');
            view.setUint32(4, 36 + pcmData.length, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, 24000, true);
            view.setUint32(28, 48000, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(36, 'data');
            view.setUint32(40, pcmData.length, true);
            new Uint8Array(buffer, 44).set(new Uint8Array(pcmData));
            return new Blob([buffer], { type: 'audio/wav' });
        }

        generateBtn.onclick = async () => {
            const text = textInput.value.trim();
            if(!text) return;

            generateBtn.disabled = true;
            document.getElementById('btnLoader').classList.remove('hidden');
            document.getElementById('btnText').innerText = 'GENERANDO...';
            statusMsg.innerText = 'PROCESANDO SEÑAL...';

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: voicePrompts[voiceSelect.value] + text }] }],
                        generationConfig: { 
                            responseModalities: ["AUDIO"],
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: voiceSelect.value } } }
                        }
                    })
                });

                const data = await response.json();
                const b64 = data.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
                
                if (!b64) throw new Error();

                const bin = atob(b64);
                const uint = new Uint8Array(bin.length);
                for (let i = 0; i < bin.length; i++) uint[i] = bin.charCodeAt(i);
                
                currentBlob = createWav(uint);
                if(currentUrl) URL.revokeObjectURL(currentUrl);
                currentUrl = URL.createObjectURL(currentBlob);
                
                mainAudio.src = currentUrl;
                saveBtn.href = currentUrl;
                
                resultPanel.classList.remove('hidden');
                statusMsg.innerText = 'LOCUCIÓN LISTA';
                mainAudio.play();
            } catch (e) {
                statusMsg.innerText = 'ERROR EN EL SERVIDOR';
            } finally {
                generateBtn.disabled = false;
                document.getElementById('btnLoader').classList.add('hidden');
                document.getElementById('btnText').innerText = 'GENERAR LOCUCIÓN';
            }
        };

        document.getElementById('shareBtn').onclick = async () => {
            if(!currentBlob) return;
            try {
                const file = new File([currentBlob], "locucion_vox.wav", { type: "audio/wav" });
                if(navigator.share) {
                    await navigator.share({
                        files: [file],
                        title: 'Locución Vox Ultra',
                    });
                }
            } catch(e) {
                statusMsg.innerText = 'USA EL BOTÓN GUARDAR';
            }
        };
    </script>
</body>
