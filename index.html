    <script>
        // Recuerda colocar tu API Key de Google AI Studio en las comillas de abajo:
        const API_KEY = "AIzaSyAB9VLBtsYjGtIRoz8gRiNEM5KZssjnzow"; 
        
        let currentBlob = null;
        let currentUrl = null;
        let textHistory = JSON.parse(localStorage.getItem('vox_history')) || [];

        const voicePrompts = {
            Charon: "Habla como un locutor profesional con 30 años de experiencia, voz profunda y autoridad. Mantén un ritmo firme y locución de radio: ",
            Kore: "",
            Zephyr: ""
        };

        const generateBtn = document.getElementById('generateBtn');
        const textInput = document.getElementById('textInput');
        const voiceSelect = document.getElementById('voiceSelect');
        const speedInput = document.getElementById('speedInput');
        const speedVal = document.getElementById('speedVal');
        const charCounter = document.getElementById('charCounter');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const progressPercent = document.getElementById('progressPercent');
        const progressStatus = document.getElementById('progressStatus');
        const etaText = document.getElementById('etaText');
        const statusMsg = document.getElementById('statusMsg');
        const resultPanel = document.getElementById('resultPanel');
        const mainAudio = document.getElementById('mainAudio');
        const saveBtn = document.getElementById('saveBtn');
        const historyPanel = document.getElementById('historyPanel');
        const historyList = document.getElementById('historyList');

        // Actualizar contador e historial al arrancar
        updateCharCount();
        renderHistory();

        // Monitores de eventos
        textInput.oninput = updateCharCount;
        speedInput.oninput = () => {
            const val = parseFloat(speedInput.value);
            speedVal.innerText = val === 1.0 ? "1.0x (Normal)" : `${val}x`;
        };

        function updateCharCount() {
            const count = textInput.value.length;
            charCounter.innerText = `${count} / 20000`;
            if (count > 19000) charCounter.className = "absolute bottom-2 right-3 text-[10px] font-mono text-red-500 font-bold";
            else charCounter.className = "absolute bottom-2 right-3 text-[10px] font-mono text-zinc-500";
        }

        function saveToHistory(text) {
            if (!text || textHistory.includes(text)) return;
            textHistory.unshift(text);
            if (textHistory.length > 3) textHistory.pop(); // Guardar solo los últimos 3
            localStorage.setItem('vox_history', JSON.stringify(textHistory));
            renderHistory();
        }

        function renderHistory() {
            if (textHistory.length === 0) { historyPanel.classList.add('hidden'); return; }
            historyPanel.classList.remove('hidden');
            historyList.innerHTML = '';
            textHistory.forEach(txt => {
                const item = document.createElement('div');
                item.className = "p-3 bg-black/30 border border-white/5 rounded-xl text-xs text-zinc-400 truncate cursor-pointer active:bg-zinc-900/50 transition-colors";
                item.innerText = txt;
                item.onclick = () => { textInput.value = txt; updateCharCount(); };
                historyList.appendChild(item);
            });
        }

        // Lógica de fragmentación inteligente para evitar voz robótica
        function splitText(text, maxChunkSize = 250) {
            const sentences = text.match(/[^.!?]+[.!?]+(\s|$)|[^.!?]+/g) || [text];
            const chunks = [];
            let currentChunk = "";

            sentences.forEach(sentence => {
                if ((currentChunk + sentence).length > maxChunkSize) {
                    if (currentChunk) chunks.push(currentChunk.trim());
                    currentChunk = sentence;
                } else {
                    currentChunk += sentence;
                }
            });
            if (currentChunk) chunks.push(currentChunk.trim());
            return chunks;
        }

        function createWavHeader(dataLength) {
            const buffer = new ArrayBuffer(44);
            const view = new DataView(buffer);
            const writeString = (o, s) => { for (let i = 0; i < s.length; i++) view.setUint8(o + i, s.charCodeAt(i)); };
            writeString(0, 'RIFF');
            view.setUint32(4, 36 + dataLength, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, 24000, true);
            view.setUint32(28, 48000, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(36, 'data');
            view.setUint32(40, dataLength, true);
            return new Uint8Array(buffer);
        }

        generateBtn.onclick = async () => {
            const rawText = textInput.value.trim();
            if(!rawText) return;

            // Validar que la API key no esté vacía antes de iniciar
            if (!API_KEY || API_KEY.trim() === "") {
                statusMsg.innerText = 'ERROR: No has colocado tu API Key de Google en el código';
                alert('Por favor, edita tu archivo en GitHub y coloca tu API Key en la línea de código correspondiente.');
                return;
            }

            generateBtn.disabled = true;
            document.getElementById('btnLoader').classList.remove('hidden');
            document.getElementById('btnText').innerText = 'PROCESANDO...';
            resultPanel.classList.add('hidden');
            statusMsg.innerText = '';
            
            // Mostrar medidor de carga
            progressContainer.classList.remove('hidden');
            updateProgress(0, 'Analizando guion...', '--s');

            const textChunks = splitText(rawText);
            const totalChunks = textChunks.length;
            let combinedPcmBuffers = [];
            let currentChunkIndex = 0;

            saveToHistory(rawText);

            try {
                for (const chunk of textChunks) {
                    currentChunkIndex++;
                    const remainingSeconds = Math.ceil((totalChunks - currentChunkIndex + 1) * 1.5);
                    const pct = Math.round(((currentChunkIndex - 1) / totalChunks) * 100);
                    updateProgress(pct, `Generando parte ${currentChunkIndex} de ${totalChunks}...`, `${remainingSeconds}s`);

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: voicePrompts[voiceSelect.value] + chunk }] }],
                            generationConfig: { 
                                responseModalities: ["AUDIO"],
                                speechConfig: { 
                                    voiceConfig: { 
                                        prebuiltVoiceConfig: { voiceName: voiceSelect.value } 
                                    } 
                                }
                            },
                            model: "gemini-2.5-flash-preview-tts"
                        })
                    });

                    if (!response.ok) {
                        if (response.status === 400 || response.status === 403) {
                            throw new Error("API_KEY_INVALID");
                        }
                        throw new Error("HTTP_ERROR_" + response.status);
                    }

                    const data = await response.json();
                    const b64 = data.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
                    
                    if (!b64) throw new Error("Fallo en la respuesta de IA");

                    const bin = atob(b64);
                    const uint = new Uint8Array(bin.length);
                    for (let i = 0; i < bin.length; i++) uint[i] = bin.charCodeAt(i);
                    combinedPcmBuffers.push(uint);
                }

                updateProgress(95, 'Uniendo segmentos de audio...', '1s');

                let totalLength = combinedPcmBuffers.reduce((acc, buf) => acc + buf.length, 0);
                let finalBuffer = new Uint8Array(44 + totalLength);
                
                const header = createWavHeader(totalLength);
                finalBuffer.set(header, 0);

                let offset = 44;
                for (const buf of combinedPcmBuffers) {
                    finalBuffer.set(buf, offset);
                    offset += buf.length;
                }

                currentBlob = new Blob([finalBuffer], { type: 'audio/wav' });
                if(currentUrl) URL.revokeObjectURL(currentUrl);
                currentUrl = URL.createObjectURL(currentBlob);
                
                mainAudio.src = currentUrl;
                mainAudio.playbackRate = parseFloat(speedInput.value);
                saveBtn.href = currentUrl;
                
                updateProgress(100, '¡Masterización lista!', '0s');
                setTimeout(() => progressContainer.classList.add('hidden'), 1000);

                resultPanel.classList.remove('hidden');
                statusMsg.innerText = 'LOCUCIÓN LISTA';
                mainAudio.play();
            } catch (e) {
                console.error(e);
                if (e.message === "API_KEY_INVALID") {
                    statusMsg.innerText = 'ERROR: Tu API Key de Google no es válida o está mal copiada';
                } else {
                    statusMsg.innerText = 'ERROR EN EL PROCESO (Inténtalo de nuevo)';
                }
                progressContainer.classList.add('hidden');
            } finally {
                generateBtn.disabled = false;
                document.getElementById('btnLoader').classList.add('hidden');
                document.getElementById('btnText').innerText = 'GENERAR LOCUCIÓN';
            }
        };

        function updateProgress(percentage, statusText, eta) {
            progressBar.style.width = `${percentage}%`;
            progressPercent.innerText = `${percentage}%`;
            progressStatus.innerText = statusText;
            etaText.innerText = `Tiempo restante est: ${eta}`;
        }

        document.getElementById('shareBtn').onclick = async () => {
            if(!currentBlob) return;
            try {
                const file = new File([currentBlob], "locucion_vox.wav", { type: "audio/wav" });
                if(navigator.share) {
                    await navigator.share({
                        files: [file],
                        title: 'Locución Vox Ultra',
                    });
                }
            } catch(e) {
                statusMsg.innerText = 'USA EL BOTÓN GUARDAR';
            }
        };
    </script>
</body>
